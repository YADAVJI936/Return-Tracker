<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DINGTREN Logistics | Tracker</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bg-dark: #0f172a; --panel: #1e293b; --accent: #3b82f6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --text-main: #f8fafc; --text-muted: #94a3b8; --border: #334155; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 20px 10px; }
        .container { max-width: 1100px; margin: auto; display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 800px) { .container { grid-template-columns: 450px 1fr; } }
        .panel { background: var(--panel); padding: 20px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        h4 { margin: 15px 0 10px 0; font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; border: 2px solid var(--accent); background: #000; min-height: 250px; }
        .form-group { margin-top: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
        input, select { width: 100%; padding: 12px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 8px; color: var(--text-main); font-size: 0.95rem; }
        button { width: 100%; background: linear-gradient(135deg, var(--accent), #2563eb); color: white; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--bg-dark); padding: 15px 5px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .stat-card h3 { margin: 0; font-size: 1.5rem; }
        .stat-card p { margin: 5px 0 0; font-size: 0.65rem; color: var(--text-muted); font-weight: bold; }
        .courier-pill { background: var(--bg-dark); border: 1px solid var(--border); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; display: inline-block; margin: 4px; }
        .btn-delete { background: rgba(239, 68, 68, 0.1); color: var(--danger); padding: 5px 10px; border-radius: 6px; cursor: pointer; border: 1px solid var(--danger); }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

<div style="text-align: center; margin-bottom: 20px;"><h1>RETURNS DASHBOARD</h1><p>Operator: Himanshu | Dingtren Enterprises</p></div>

<div class="container">
    <div class="panel">
        <h2>Live Scanner</h2>
        <div id="reader"></div>
        <div class="form-group"><label>AWB Number</label><input type="text" id="awbInput" placeholder="Scan AWB..."></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="form-group"><label>Type</label><select id="returnType"><option>Customer Return</option><option>RTO</option></select></div>
            <div class="form-group"><label>Courier</label><select id="courierPartner"><option>Valmo</option><option>Shadowfax</option><option>Delhivery</option><option>Ecom Express</option><option>Xpressbees</option></select></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(59,130,246,0.05); padding: 10px; border-radius: 8px; margin-top: 15px;">
            <div class="form-group" style="margin-top:0;"><label>OTP Given</label><input type="number" id="qtyOtp" value="0"></div>
            <div class="form-group" style="margin-top:0;"><label>Actual Receive</label><input type="number" id="qtyReceived" value="0"></div>
        </div>
        <button onclick="saveData()">Log Parcel</button>
    </div>

    <div class="panel">
        <h2>Today's Analytics</h2>
        <div class="stats-grid">
            <div class="stat-card"><h3 id="statOtpGiven" style="color:var(--accent)">0</h3><p>OTP Given</p></div>
            <div class="stat-card"><h3 id="statActualRec" style="color:var(--success)">0</h3><p>Actual Receive</p></div>
            <div class="stat-card"><h3 id="statCustRtn" style="color:var(--success)">0</h3><p>Customer Rtn</p></div>
            <div class="stat-card"><h3 id="statRTO" style="color:var(--warning)">0</h3><p>Total RTO</p></div>
        </div>
        <h4>RTO by Courier</h4><div id="rtoCourierBreakdown"></div>
        <h4>Customer Returns by Courier</h4><div id="custCourierBreakdown"></div>
        <div class="table-wrap">
            <table><thead><tr><th>AWB / Time</th><th>Type</th><th>Courier</th><th>Action</th></tr></thead><tbody id="tableBody"></tbody></table>
        </div>
    </div>
</div>

<script>
    // Initialize Scanner
    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (txt) => { document.getElementById('awbInput').value = txt; });

    function saveData() {
        const awb = document.getElementById('awbInput').value.trim();
        if (!awb) return alert("Scan AWB first!");
        
        const entry = { 
            id: Date.now(), 
            date: new Date().toISOString().split('T')[0], 
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), 
            awb, 
            type: document.getElementById('returnType').value, 
            courier: document.getElementById('courierPartner').value, 
            otp: parseInt(document.getElementById('qtyOtp').value) || 0,
            rec: parseInt(document.getElementById('qtyReceived').value) || 0
        };

        let data = JSON.parse(localStorage.getItem('dingtrenReturns') || '[]');
        data.unshift(entry);
        localStorage.setItem('dingtrenReturns', JSON.stringify(data));
        
        document.getElementById('awbInput').value = "";
        document.getElementById('qtyOtp').value = "0";
        document.getElementById('qtyReceived').value = "0";
        renderDashboard();
    }

    function renderDashboard() {
        let data = JSON.parse(localStorage.getItem('dingtrenReturns') || '[]');
        let filtered = data.filter(i => i.date === new Date().toISOString().split('T')[0]);
        let tOtp=0, tRec=0, tRto=0, tCust=0;
        let rtoC={}, custC={};
        
        filtered.forEach(i => {
            tOtp += i.otp || 0; 
            tRec += i.rec || 0;
            if(i.type === 'RTO') { tRto += i.rec; rtoC[i.courier] = (rtoC[i.courier]||0) + i.rec; }
            else { tCust += i.rec; custC[i.courier] = (custC[i.courier]||0) + i.rec; }
        });
        
        document.getElementById('statOtpGiven').innerText = tOtp;
        document.getElementById('statActualRec').innerText = tRec;
        document.getElementById('statCustRtn').innerText = tCust;
        document.getElementById('statRTO').innerText = tRto;
        
        document.getElementById('tableBody').innerHTML = filtered.map(i => `<tr><td><strong>${i.awb}</strong><br>${i.time}</td><td>${i.type}</td><td>${i.courier}</td><td><button class="btn-delete" onclick="deleteEntry(${i.id})">Del</button></td></tr>`).join('');
        document.getElementById('rtoCourierBreakdown').innerHTML = Object.entries(rtoC).map(([c,v]) => `<div class="courier-pill">${c}: ${v}</div>`).join('');
        document.getElementById('custCourierBreakdown').innerHTML = Object.entries(custC).map(([c,v]) => `<div class="courier-pill">${c}: ${v}</div>`).join('');
    }
    
    function deleteEntry(id) { 
        let data = JSON.parse(localStorage.getItem('dingtrenReturns') || '[]');
        localStorage.setItem('dingtrenReturns', JSON.stringify(data.filter(i => i.id !== id))); 
        renderDashboard(); 
    }
</script>
</body>
</html>
