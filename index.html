<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINGTREN Claim Hub v7.0</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #0f172a;
            --success: #10b981;
            --danger: #f43f5e;
            --surface: #ffffff; 
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --radius-md: 12px;
            --radius-lg: 20px;
        }

        body { 
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif; 
            background: #f8fafc;
            padding: 15px; 
            margin: 0; 
            display: flex;
            justify-content: center;
            color: var(--text-main);
        }

        .app-card { 
            width: 100%;
            max-width: 540px; 
            background: var(--surface); 
            border-radius: var(--radius-lg); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            overflow: hidden; 
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        .header { 
            background: var(--secondary); 
            color: white; 
            padding: 20px; 
            text-align: center; 
            border-bottom: 4px solid var(--primary);
        }
        
        .header h2 { margin: 0; font-size: 20px; font-weight: 800; display: flex; justify-content: center; align-items: center; gap: 10px;}
        .v7-badge { background: var(--primary); color: white; font-size: 11px; padding: 4px 10px; border-radius: 20px; }

        .upload-section { background: #f8fafc; padding: 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .upload-section label { font-weight: 800; color: var(--primary); display: block; margin-bottom: 10px; font-size: 13px;}
        input[type="file"] { width: 100%; padding: 12px; background: white; border-radius: var(--radius-md); border: 2px dashed #cbd5e1; cursor: pointer; box-sizing: border-box;}

        .status-badge { display: inline-block; margin-top: 10px; padding: 6px 16px; border-radius: 20px; font-size: 11px; font-weight: 800; background: #f1f5f9; color: var(--text-muted); }
        .status-success { background: #def7ec; color: #046c4e; }

        /* THE SCANNER FIX */
        #reader-container { display: none; background: #1e293b; border-radius: var(--radius-md); margin: 15px 20px; overflow: hidden; border: 2px solid var(--primary); }
        #reader { width: 100%; min-height: 250px; display: flex; align-items: center; justify-content: center; flex-direction: column;}
        .close-cam { width: 100%; background: var(--danger); color: white; border: none; padding: 15px; cursor: pointer; font-weight: 800; font-size: 14px; text-transform: uppercase; }

        .content { padding: 20px; }
        .field-group { margin-bottom: 25px; }
        .field-group label { display: block; font-size: 12px; font-weight: 800; color: var(--secondary); margin-bottom: 8px; text-transform: uppercase;}
        
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        input[type="text"], select, textarea { flex: 1; padding: 14px; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 14px; font-family: monospace; font-weight: 600; background: #f8fafc; width: 100%; box-sizing: border-box; }
        input[type="text"]:focus, select:focus, textarea:focus { border-color: var(--primary); outline: none; background: white;}
        textarea { font-family: 'Plus Jakarta Sans', sans-serif; min-height: 120px; }

        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .data-pill { background: #f8fafc; border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px; font-size: 12px; color: var(--text-muted); font-weight: 700; display: flex; flex-direction: column; gap: 4px;}
        .data-pill span { font-size: 14px; color: var(--text-main); font-family: monospace; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        
        .success-pill { background: #f0fdf4; border-color: #86efac; }
        .success-pill span { color: #166534; }
        .error-pill { background: #fef2f2; border-color: #fca5a5; }
        .error-pill span { color: #991b1b; }

        .btn-row { display: flex; gap: 10px; }
        button { flex: 1; padding: 14px; border: none; border-radius: var(--radius-md); font-weight: 800; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        button:active { transform: scale(0.97); }

        .btn-scan { background: var(--secondary); color: white; }
        .btn-copy { background: white; border: 1px solid var(--border); color: var(--text-main); }
        .btn-copy-sub { background: var(--success); color: white; white-space: nowrap; padding: 14px 20px;}
        .btn-media { background: var(--primary); color: white; }
        
        .radio-group { display: flex; gap: 15px; margin-bottom: 15px; background: #f8fafc; padding: 12px; border-radius: var(--radius-md); border: 1px solid var(--border);}
        .radio-group label { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; cursor: pointer; margin: 0;}

        .ai-dashboard { background: #f8fafc; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-top: 15px; }
        .ai-stats { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat-box { flex: 1; background: #fff; border: 1px solid var(--border); border-radius: var(--radius-md); padding: 15px 10px; text-align: center;}
        .stat-box h3 { margin: 0; font-size: 22px; color: var(--primary); font-weight: 800; }
        .stat-box p { margin: 4px 0 0; font-size: 10px; color: var(--text-muted); font-weight: 800; text-transform: uppercase;}
        .history-list { max-height: 150px; overflow-y: auto; font-size: 12px; background: #fff; border: 1px solid var(--border); border-radius: var(--radius-md); padding: 8px; }
        .history-item { padding: 10px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center;}
        
        .btn-log { background: var(--text-main); color: white; width: 100%; margin-bottom: 15px; }
        #btn-push-meesho { width: 100%; padding: 18px; background: var(--primary); color: white; border-radius: var(--radius-md); font-weight: 800; font-size: 14px; text-transform: uppercase; border: none;}
        .clear-btn { width: 100%; background: transparent; color: var(--text-muted); margin-top: 20px; border: 2px dashed #cbd5e1; padding: 15px; border-radius: var(--radius-md); font-weight: 800;}
        .divider { height: 1px; background: var(--border); margin: 25px 0; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h2>DINGTREN CLAIM HUB <span class="v7-badge">v7.0 Ultimate</span></h2>
    </div>

    <div class="upload-section">
        <label>📄 Load Excel/CSV Master Report</label>
        <input type="file" id="excelFile" accept=".csv, .xlsx, .xls">
        <div id="fileStatus" class="status-badge">Awaiting File...</div>
    </div>

    <div id="reader-container">
        <div id="reader">
            <h3 style="color:white; margin:0;">Waiting for camera...</h3>
        </div>
        <button type="button" class="close-cam" onclick="stopScanner()">🛑 Close Scanner</button>
    </div>

    <div class="content">
        <div class="field-group">
            <label>1. AWB Tracking Number</label>
            <div class="input-row">
                <input type="text" id="awb" placeholder="Scan or Type..." oninput="manualAwbCheck()">
            </div>
            <div class="btn-row">
                <button type="button" class="btn-scan" onclick="startScanner('awb')">📷 Scan AWB</button>
                <button type="button" class="btn-copy" onclick="copy('awb')">📋 Copy</button>
            </div>
            <div id="duplicateWarning" style="color: var(--danger); font-size: 12px; font-weight: 700; display: none; margin-top: 10px; background: #fff1f2; padding: 10px; border-radius: var(--radius-md); border: 1px solid #fecdd3;">⚠️ Warning: You have already logged this AWB today.</div>
        </div>

        <div class="field-group">
            <label>2. Order Details (Auto-Synced)</label>
            <div class="input-row">
                <input type="text" id="subid" placeholder="Sub-Order ID" readonly>
                <button type="button" class="btn-copy-sub" onclick="copy('subid')">✅ Copy ID</button>
            </div>
            <div class="data-grid">
                <div class="data-pill" id="pill-sku">SKU ID<span id="txt-sku">Waiting...</span></div>
                <div class="data-pill" id="pill-qty">Quantity<span id="txt-qty">-</span></div>
            </div>
            <div class="data-pill" id="pill-reason" style="margin-bottom: 10px;">
                Meesho Listed Reason<span id="txt-reason">Waiting...</span>
            </div>
            <input type="hidden" id="sku"><input type="hidden" id="qty"><input type="hidden" id="fileReason">
        </div>

        <div class="divider"></div>

        <div class="field-group">
            <label>3. Packet ID verification</label>
            <div class="input-row">
                <input type="text" id="pid" placeholder="Scan Packet ID..." oninput="generateTicket()">
            </div>
            <div class="btn-row">
                <button type="button" class="btn-scan" onclick="startScanner('pid')" style="background: #334155;">📷 Scan Packet</button>
                <button type="button" class="btn-copy" onclick="copy('pid')">📋 Copy</button>
            </div>
        </div>

        <div class="divider"></div>

        <div class="field-group">
            <label>4. Evidence Capture</label>
            
            <div class="btn-row" id="camera-start-buttons">
                <button type="button" class="btn-media" onclick="turnOnCamera()">📸 Turn On Camera System</button>
            </div>

            <div id="live-media-container" style="display: none; background: #000; border-radius: var(--radius-md); overflow: hidden; border: 2px solid var(--secondary); margin-top: 10px;">
                <video id="live-media-feed" autoplay playsinline muted style="width: 100%; display: block; object-fit: cover; max-height: 300px;"></video>
                <div style="padding: 12px; display: flex; flex-wrap: wrap; gap: 8px; background: var(--secondary);">
                    <button type="button" id="btn-snap" style="background: var(--primary); color: white;" onclick="captureLivePhoto()">📸 SNAP</button>
                    <button type="button" id="btn-rec-start" style="background: var(--danger); color: white;" onclick="startLiveRecording()">🔴 REC</button>
                    <button type="button" id="btn-rec-stop" style="display: none; background: var(--success); color: white;" onclick="stopLiveRecording()">⏹️ STOP</button>
                    <button type="button" style="background: #475569; color: white;" onclick="turnOffCamera()">❌ CANCEL</button>
                </div>
            </div>
            <div id="mediaStatus" style="font-size: 12px; font-weight: 800; color: var(--text-muted); margin-top: 10px; text-align: center;">Camera is currently off.</div>
        </div>

        <div class="divider"></div>

        <div class="field-group">
            <label>5. Smart Ticket Generator</label>
            <div class="radio-group">
                <label><input type="radio" name="returnType" value="RTO" onchange="toggleReason(); generateTicket()"> Courier Return (RTO)</label>
                <label><input type="radio" name="returnType" value="Customer Return" onchange="toggleReason(); generateTicket()"> Customer Return</label>
            </div>
            <div id="reasonContainer" style="display: none; margin-bottom: 12px;">
                <select id="returnReason" onchange="generateTicket()" style="width: 100%; padding: 14px; border-radius: var(--radius-md); font-size: 14px; font-weight: 700; border: 1px solid var(--border);">
                    <option value="" disabled selected>Select Claim Reason...</option>
                    <option value="I have received wrong return">Received wrong return</option>
                    <option value="I have received damaged return">Received damaged return</option>
                    <option value="I have not received my Return/RTO shipment">Did not receive shipment</option>
                    <option value="Item/s are missing in my return">Items are missing</option>
                    <option value="I have received a wrong barcoded package in RTO">Wrong barcoded package</option>
                    <option value="I have received used product as return">Received used product</option>
                    <option value="Return/RTO product not received but marked delivered">Marked delivered but not received</option>
                    <option value="Return/RTO Delivery Issue - False Attempt by Logistic Partner">False Attempt by Courier</option>
                    <option value="Size related issue">Size related issue</option>
                    <option value="Other Returns/RTO and Exchange related issue">Other Issue</option>
                </select>
            </div>
            <textarea id="ticketMessage" placeholder="Generated ticket will appear here..." readonly></textarea>
            <button type="button" id="btn-push-meesho" onclick="copy('ticketMessage')">COPY TICKET TO CLIPBOARD</button>
        </div>

        <div class="field-group" style="margin-bottom: 0;">
            <label>6. Local Database Log</label>
            <button type="button" class="btn-log" onclick="logCurrentClaim()">💾 Save Record & Clear Fields</button>
            <div class="ai-dashboard">
                <div class="ai-stats">
                    <div class="stat-box"><h3 id="stat-total">0</h3><p>Total</p></div>
                    <div class="stat-box"><h3 id="stat-rto">0</h3><p>RTO</p></div>
                    <div class="stat-box"><h3 id="stat-cr">0</h3><p>Cust Ret</p></div>
                </div>
                <div class="history-list" id="history-container">
                    <div style="padding: 15px; text-align: center; color: var(--text-muted); font-weight: 600;">No claims logged today.</div>
                </div>
                <div class="btn-row" style="margin-top: 15px;">
                    <button type="button" style="background: var(--success); color: white;" onclick="exportToCSV()">📊 Download CSV</button>
                    <button type="button" style="background: white; color: var(--danger); border: 1px solid var(--danger);" onclick="clearDatabase()">🗑️ Erase DB</button>
                </div>
            </div>
        </div>
        <button type="button" class="clear-btn" onclick="clearForm()">Reset All Fields</button>
    </div>
</div>

<script>
    window.onload = function() {
        updateDashboard(); 
        document.getElementById('awb').focus(); 
    };

    // --- 🚀 THE MOTOROLA SCANNER FIX ENGINE ---
    let html5QrCode = null;
    let currentTarget = '';

    async function startScanner(targetField) {
        // 1. COMPLETELY DESTROY ANY ACTIVE CAMERAS FIRST
        if (window.liveMediaStream) {
            window.liveMediaStream.getTracks().forEach(track => track.stop());
            window.liveMediaStream = null;
        }
        document.getElementById('live-media-feed').srcObject = null;
        turnOffCameraUI(); // Hide UI
        
        currentTarget = targetField;
        const readerContainer = document.getElementById('reader-container');
        const readerDiv = document.getElementById('reader');
        
        // 2. SHOW THE LOADING SCREEN SO IT ISN'T BLANK
        readerContainer.style.display = 'block';
        readerDiv.innerHTML = '<h3 style="color:white; margin:0;">🔄 Loading Lens. Please Wait...</h3>';

        // 3. WAIT EXACTLY 800ms FOR ANDROID HARDWARE TO UNLOCK
        setTimeout(async () => {
            try {
                if (html5QrCode && html5QrCode.isScanning) {
                    await html5QrCode.stop();
                    html5QrCode.clear();
                }

                html5QrCode = new Html5Qrcode("reader");
                const config = { fps: 15, qrbox: { width: 250, height: 150 } };
                
                // Force fetch back camera specifically
                const devices = await Html5Qrcode.getCameras();
                let backCameraId = null;
                if (devices && devices.length > 0) {
                    const backCam = devices.find(d => d.label.toLowerCase().includes('back') || d.label.toLowerCase().includes('rear') || d.label.toLowerCase().includes('environment'));
                    backCameraId = backCam ? backCam.id : devices[devices.length - 1].id;
                }

                const onScanSuccess = (decodedText) => {
                    const text = String(decodedText).trim();
                    if (currentTarget === 'awb' && (text.includes('http') || text.includes('{'))) return;
                    document.getElementById(currentTarget).value = text;
                    if (currentTarget === 'awb') { findSubOrderId(text); checkDuplicate(text); }
                    generateTicket();
                    stopScanner();
                };

                if (backCameraId) {
                    await html5QrCode.start(backCameraId, config, onScanSuccess);
                } else {
                    await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
                }

            } catch (err) {
                readerDiv.innerHTML = `<div style="color:var(--danger); padding:20px; font-weight:bold; text-align:center;">⚠️ Camera Blocked by Phone.<br>Close Scanner and try again.</div>`;
            }
        }, 800);
    }

    function stopScanner() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                html5QrCode.clear();
                document.getElementById('reader-container').style.display = 'none'; 
            }).catch(err => {
                document.getElementById('reader-container').style.display = 'none'; 
            });
        } else {
            document.getElementById('reader-container').style.display = 'none'; 
        }
    }


    // --- MANUAL CAMERA ENGINE ---
    let liveMediaRecorder = null;
    let recordedChunks = [];
    let sizeCheckInterval = null;

    async function turnOnCamera() {
        document.getElementById('camera-start-buttons').style.display = 'none';
        document.getElementById('live-media-container').style.display = 'block';
        const video = document.getElementById('live-media-feed'); 
        const status = document.getElementById('mediaStatus');
        status.innerText = "Accessing camera lenses...";
        
        try {
            window.liveMediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
        } catch (err) {
            try {
                window.liveMediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
            } catch (err2) {
                status.innerText = "Camera Access Blocked."; 
                turnOffCameraUI();
                return;
            }
        }
        video.srcObject = window.liveMediaStream; 
        video.play().catch(e => console.log(e));
        status.innerText = "🟢 Camera Active. Ready to capture."; 
        status.style.color = "var(--success)";
    }

    function turnOffCameraUI() {
        document.getElementById('live-media-container').style.display = 'none';
        document.getElementById('camera-start-buttons').style.display = 'flex';
        document.getElementById('btn-snap').style.display = 'block'; 
        document.getElementById('btn-rec-start').style.display = 'block'; 
        document.getElementById('btn-rec-stop').style.display = 'none';
        const status = document.getElementById('mediaStatus');
        status.innerText = "Camera is turned off.";
        status.style.color = "var(--text-muted)";
    }

    function turnOffCamera() {
        if (window.liveMediaStream) {
            window.liveMediaStream.getTracks().forEach(track => track.stop());
            window.liveMediaStream = null;
        }
        if (sizeCheckInterval) clearInterval(sizeCheckInterval);
        if (liveMediaRecorder && liveMediaRecorder.state !== "inactive") liveMediaRecorder.stop();
        document.getElementById('live-media-feed').srcObject = null;
        turnOffCameraUI();
    }

    function captureLivePhoto() {
        if (!window.liveMediaStream) return alert("Please turn on the camera first.");
        const video = document.getElementById('live-media-feed'); const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 1280; canvas.height = video.videoHeight || 720;
        const ctx = canvas.getContext('2d'); ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        canvas.toBlob((blob) => {
            if(!blob) return; const url = URL.createObjectURL(blob); const a = document.createElement('a');
            const ts = new Date().getTime(); const awbVal = document.getElementById('awb').value || "Claim";
            a.download = `Photo_${awbVal}_${ts}.jpg`; a.href = url;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            setTimeout(() => { URL.revokeObjectURL(url); ctx.clearRect(0, 0, canvas.width, canvas.height); }, 1000); 
            
            const status = document.getElementById('mediaStatus'); status.innerHTML = `✅ Snap Saved successfully!`;
            setTimeout(() => { if(window.liveMediaStream) status.innerText = "🟢 Camera Active. Ready to capture."; }, 2000);
        }, 'image/jpeg', 0.85);
    }

    function startLiveRecording() {
        if (!window.liveMediaStream) return alert("Please turn on the camera first."); recordedChunks = [];
        let options = { mimeType: 'video/mp4' };
        if (!MediaRecorder.isTypeSupported('video/mp4')) options = { mimeType: 'video/webm' };
        try { liveMediaRecorder = new MediaRecorder(window.liveMediaStream, options); } catch (e) {
            try { liveMediaRecorder = new MediaRecorder(window.liveMediaStream); } catch (err) { return alert("Codec unsupported."); }
        }
        document.getElementById('btn-snap').style.display = 'none'; document.getElementById('btn-rec-start').style.display = 'none'; document.getElementById('btn-rec-stop').style.display = 'block';
        const status = document.getElementById('mediaStatus'); status.innerHTML = `🔴 RECORDING: 0.00 MB / 23.00 MB`; status.style.color = "var(--danger)";
        liveMediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) recordedChunks.push(e.data); };
        liveMediaRecorder.start(250);
        sizeCheckInterval = setInterval(() => {
            const sizeMB = (new Blob(recordedChunks).size / (1024 * 1024)).toFixed(2);
            status.innerHTML = `🔴 RECORDING: ${sizeMB} MB / 23.00 MB`; if (sizeMB >= 23.00) stopLiveRecording(true);
        }, 250);
    }

    function stopLiveRecording(limitHit = false) {
        if (liveMediaRecorder && liveMediaRecorder.state !== "inactive") liveMediaRecorder.stop();
        clearInterval(sizeCheckInterval);
        document.getElementById('btn-snap').style.display = 'block'; document.getElementById('btn-rec-start').style.display = 'block'; document.getElementById('btn-rec-stop').style.display = 'none';
        const status = document.getElementById('mediaStatus'); status.innerText = "Processing video..."; status.style.color = "var(--text-muted)";
        
        setTimeout(() => {
            const finalBlob = new Blob(recordedChunks, { type: liveMediaRecorder.mimeType || 'video/mp4' });
            const finalSizeMB = (finalBlob.size / (1024 * 1024)).toFixed(2);
            const url = URL.createObjectURL(finalBlob); const a = document.createElement('a');
            const ts = new Date().getTime(); const awbVal = document.getElementById('awb').value || "Claim";
            let ext = finalBlob.type.includes("webm") ? "webm" : "mp4";
            a.download = `Video_${awbVal}_${ts}.${ext}`; a.href = url;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            setTimeout(() => { URL.revokeObjectURL(url); recordedChunks = []; }, 2000);
            
            status.innerHTML = limitHit ? `✅ Saved strictly at 23MB limit. (${finalSizeMB} MB).` : `✅ Video saved (${finalSizeMB} MB).`;
            status.style.color = "var(--success)";
            setTimeout(() => { if(window.liveMediaStream) status.innerText = "🟢 Camera Active. Ready to capture."; }, 3000);
        }, 500); 
    }


    // --- EXCEL LOGIC ---
    let excelData = []; 
    document.getElementById('excelFile').addEventListener('change', function(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            excelData = XLSX.utils.sheet_to_json(XLSX.read(data, {type: 'array'}).Sheets[XLSX.read(data, {type: 'array'}).SheetNames[0]], {header: 1});
            document.getElementById('fileStatus').innerText = `✅ Database Connected (${excelData.length} Vectors)`; 
            document.getElementById('fileStatus').className = "status-badge status-success";
        }; reader.readAsArrayBuffer(file);
    });

    function findSubOrderId(awbScanned) {
        if (excelData.length === 0) return; const cleanAwb = String(awbScanned).trim().toUpperCase();
        let foundSubId = null; let foundSku = null; let foundQty = null; let foundReason = null;
        for (let r = 0; r < excelData.length; r++) {
            if (excelData[r].join("|||").toUpperCase().includes(cleanAwb)) {
                if (excelData[r].length > 8) foundSubId = String(excelData[r][8]).trim();  
                if (excelData[r].length > 2) foundSku = String(excelData[r][2]).trim();    
                if (excelData[r].length > 6) foundQty = String(excelData[r][6]).trim();  
                if (excelData[r].length > 19) foundReason = String(excelData[r][19]).trim(); 
                break; 
            }
        }
        const subIdBox = document.getElementById('subid'); const skuBox = document.getElementById('sku'); const qtyBox = document.getElementById('qty'); const reasonBox = document.getElementById('fileReason');
        const pSku = document.getElementById('pill-sku'); const pQty = document.getElementById('pill-qty'); const pReason = document.getElementById('pill-reason');
        const tSku = document.getElementById('txt-sku'); const tQty = document.getElementById('txt-qty'); const tReason = document.getElementById('txt-reason');

        if (foundSubId && foundSubId !== "undefined" && foundSubId !== "") {
            subIdBox.value = foundSubId; skuBox.value = foundSku || "N/A"; qtyBox.value = foundQty || "1"; reasonBox.value = foundReason || "N/A";
            tSku.innerText = skuBox.value; tQty.innerText = qtyBox.value; tReason.innerText = reasonBox.value;
            subIdBox.style.borderColor = "var(--success)"; subIdBox.style.backgroundColor = "#f0fdf4";
            pSku.className = "data-pill success-pill"; pQty.className = "data-pill success-pill"; pReason.className = "data-pill success-pill";
        } else {
            subIdBox.value = "NOT FOUND"; skuBox.value = ""; qtyBox.value = ""; reasonBox.value = "";
            tSku.innerText = "No Data"; tQty.innerText = "-"; tReason.innerText = "No Data";
            subIdBox.style.borderColor = "var(--danger)"; subIdBox.style.backgroundColor = "#fff1f2";
            pSku.className = "data-pill error-pill"; pQty.className = "data-pill error-pill"; pReason.className = "data-pill error-pill";
        }
        generateTicket(); 
    }

    function manualAwbCheck() { const val = document.getElementById('awb').value.trim(); findSubOrderId(val); checkDuplicate(val); generateTicket(); }

    function copy(id) {
        const field = document.getElementById(id); if(!field.value || field.value.includes("NOT FOUND")) return;
        field.select(); document.execCommand('copy'); 
        if(id === 'ticketMessage') {
            const btn = document.getElementById('btn-push-meesho'); const orig = btn.innerText;
            btn.innerText = "✨ COPIED TO SYSTEM CLIPBOARD!"; btn.style.background = "var(--success)"; 
            setTimeout(() => { btn.innerText = orig; btn.style.background = "var(--primary)"; }, 2000);
        } else {
            const originalBg = field.style.background; field.style.background = "#fef08a";
            setTimeout(() => { field.style.background = originalBg; }, 500);
        }
    }

    let smartDB = JSON.parse(localStorage.getItem('dingtrenSmartDB')) || [];
    function checkDuplicate(awbCheck) {
        const isDupe = smartDB.some(item => item.awb === awbCheck && item.awb !== "");
        document.getElementById('duplicateWarning').style.display = isDupe ? 'block' : 'none';
        document.getElementById('awb').style.borderColor = isDupe ? "var(--danger)" : "var(--border)";
    }

    function logCurrentClaim() {
        const awb = document.getElementById('awb').value; const subid = document.getElementById('subid').value;
        if (!awb || awb.length < 5) return alert("Validation error: Invalid AWB."); 
        if (smartDB.some(item => item.awb === awb) && !confirm("Override identical primary key log item?")) return;
        smartDB.push({ date: new Date().toLocaleString(), awb, subid, type: document.querySelector('input[name="returnType"]:checked')?.value || "Uncategorized" });
        localStorage.setItem('dingtrenSmartDB', JSON.stringify(smartDB));
        updateDashboard(); clearForm(); 
    }

    function updateDashboard() {
        document.getElementById('stat-total').innerText = smartDB.length;
        document.getElementById('stat-rto').innerText = smartDB.filter(i => i.type === 'RTO').length;
        document.getElementById('stat-cr').innerText = smartDB.filter(i => i.type === 'Customer Return').length;
        const container = document.getElementById('history-container');
        if (smartDB.length === 0) { container.innerHTML = `<div style="padding: 15px; text-align: center; color: var(--text-muted); font-weight: 600;">Logs clean. Local index empty.</div>`; return; }
        container.innerHTML = smartDB.slice().reverse().map(item => `<div class="history-item"><div><b style="color: var(--text-main)">${item.awb}</b><br><span style="color:var(--text-muted); font-size:10px;">${item.date}</span></div><div style="color: var(--primary); font-weight:800; background: #e0e7ff; padding: 4px 8px; border-radius: 6px; font-size:10px;">${item.type}</div></div>`).join('');
    }

    function exportToCSV() {
        if (smartDB.length === 0) return alert("Array index empty."); 
        let csvContent = "data:text/csv;charset=utf-8,Date,AWB,Sub-Order ID,Return Type\n" + smartDB.map(e => `"${e.date}","${e.awb}","${e.subid}","${e.type}"`).join("\n");
        const link = document.createElement("a"); link.setAttribute("href", encodeURI(csvContent)); link.setAttribute("download", `DINGTREN_Claim_Report_${new Date().toLocaleDateString().replace(/\//g,'-')}.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }

    function clearDatabase() { if(confirm("Wipe completely?")) { smartDB = []; localStorage.setItem('dingtrenSmartDB', JSON.stringify(smartDB)); updateDashboard(); clearForm(); } }

    function clearForm() {
        document.getElementById('awb').value = ''; document.getElementById('subid').value = ''; document.getElementById('pid').value = ''; document.getElementById('sku').value = ''; document.getElementById('qty').value = ''; document.getElementById('fileReason').value = '';
        document.getElementById('txt-sku').innerText = "Waiting..."; document.getElementById('txt-qty').innerText = "-"; document.getElementById('txt-reason').innerText = "Waiting...";
        document.getElementById('pill-sku').className = "data-pill"; document.getElementById('pill-qty').className = "data-pill"; document.getElementById('pill-reason').className = "data-pill";
        ['subid', 'awb'].forEach(id => { const el = document.getElementById(id); if(el) { el.style.borderColor = "var(--border)"; el.style.backgroundColor = "#f8fafc"; } });
        document.getElementById('ticketMessage').value = ''; document.getElementById('returnReason').selectedIndex = 0; document.getElementById('duplicateWarning').style.display = 'none';
        const rtoRadio = document.querySelector('input[name="returnType"][value="RTO"]'); const crRadio = document.querySelector('input[name="returnType"][value="Customer Return"]');
        if(rtoRadio) rtoRadio.checked = false; if(crRadio) crRadio.checked = false; document.getElementById('reasonContainer').style.display = 'none';
        turnOffCamera();
        document.getElementById('awb').focus(); 
    }

    function toggleReason() { document.getElementById('reasonContainer').style.display = document.querySelector('input[name="returnType"][value="RTO"]').checked ? 'none' : 'block'; }

    function generateTicket() {
        const awb = document.getElementById('awb').value || "[Scan AWB]"; const subId = document.getElementById('subid').value || "[Scan to Auto-fill]";
        const sku = document.getElementById('sku').value && document.getElementById('sku').value !== "N/A" ? document.getElementById('sku').value : "";
        const qty = document.getElementById('qty').value && document.getElementById('qty').value !== "N/A" ? document.getElementById('qty').value : "";
        const fileReason = document.getElementById('fileReason').value && document.getElementById('fileReason').value !== "N/A" ? document.getElementById('fileReason').value : "";
        const pid = document.getElementById('pid').value; const pidText = pid ? `\nPacket ID: ${pid}` : "";
        const returnType = document.querySelector('input[name="returnType"]:checked')?.value;
        let detailedIssue = "";

        if (!returnType) detailedIssue = "Select ticket classification category.";
        else if (returnType === "RTO") detailedIssue = `Issue: RTO Shipment Problem\n\nDescription:\n1. Packaging standard: The product was dispatched in a high-burst-strength 3-ply corrugated box.\n2. Product Nature: High-grade plastic bangle box.\n3. Evidence: I have received an RTO package, but upon opening it on camera, it was found to be damaged/tampered due to courier mishandling during transit.\n\nRequest: Please review the attached unboxing video and approve this claim under the Seller Protection Fund (SPF) due to clear logistic negligence.`;
        else {
            const reason = document.getElementById('returnReason').value;
            if (!reason) detailedIssue = "Select a specific reason from the dropdown.";
            else {
                switch(reason) {
                    case "I have received damaged return": detailedIssue = `Issue: Received Damaged Return\n\nDescription:\n1. Packaging standard: The product was shipped in a high-burst-strength 3-ply corrugated box (industry standard).\n2. Product Nature: This is a high-grade plastic bangle box.\n3. Evidence of Negligence: The cracks/breaks occurred due to extreme external pressure and courier mishandling during transit, which exceeded the protection of a 3-ply box.\n4. Compliance: I have followed all Meesho packaging guidelines. The unboxing video clearly shows the outer package was damaged/mishandled.\n\nRequest: Please approve this claim under the Seller Protection Fund (SPF) as this is a clear case of courier negligence.`; break;
                    case "I have received wrong return": detailedIssue = `Issue: Received Wrong Return\n\nDescription:\nInstead of the high-grade plastic bangle box that was originally dispatched, I have received a completely different and incorrect item. The attached unboxing video clearly demonstrates the intact return packaging being opened to reveal the fraudulent item inside.\n\nRequest: This is a clear case of fraud. Please investigate and approve my SPF claim.`; break;
                    case "Item/s are missing in my return": detailedIssue = `Issue: Items Missing in Return\n\nDescription:\nThe returned package was received partially empty. Some plastic bangle box units from the original order are missing. The continuous unboxing video clearly shows the sealed package being opened and the exact deficit in contents.\n\nRequest: Please process the SPF claim for the missing units based on the attached video evidence.`; break;
                    case "I have received used product as return": detailedIssue = `Issue: Received Used Product\n\nDescription:\nThe customer has returned a used/degraded item instead of the brand new plastic bangle box that was dispatched. This violates the return policy. The unboxing video is attached for your reference.\n\nRequest: Please approve the SPF claim for this unacceptable customer return.`; break;
                    default: detailedIssue = `Issue: ${reason}\n\nDescription:\nI am raising an issue regarding this order. I have securely packaged the original plastic bangle box following all Meesho guidelines. Please review the specific details in the attached unboxing video/photos which serve as clear evidence of the issue at hand.\n\nRequest: Kindly investigate this matter and process the SPF claim accordingly.`;
                }
            }
        }
        let template = `Dear Meesho Support,\n\nAWB Number: ${awb}\nSub-Order ID: ${subId}`;
        if(sku) template += `\nSKU: ${sku}`; if(qty) template += `\nQuantity: ${qty}`; if(fileReason) template += `\nMeesho Listed Reason: ${fileReason}`;
        template += `${pidText}\n\n${detailedIssue}`; document.getElementById('ticketMessage').value = template;
    }
</script>
</body>
</html>
